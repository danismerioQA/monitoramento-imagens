<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monitoramento Diário — Cyber/QuintoAndar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:.95rem;font-weight:600;color:#e6edf3}
.run-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.run-bar label{font-size:.78rem;color:#8b949e;white-space:nowrap}
.run-bar select{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:5px 10px;font-size:.82rem;cursor:pointer}
.run-bar select:focus{outline:none;border-color:#58a6ff}
.meta{font-size:.75rem;color:#8b949e;white-space:nowrap}
.tabs{background:#161b22;border-bottom:1px solid #30363d;padding:0 16px;display:flex;gap:2px;overflow-x:auto}
.tab{background:none;border:none;color:#8b949e;padding:11px 18px;cursor:pointer;font-size:.88rem;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab:hover{color:#c9d1d9}
.tab.active{color:#58a6ff;border-bottom-color:#1f6feb}
.panel{display:none;padding:20px}
.panel.active{display:block}
.m-block{margin-bottom:28px}
.m-title{font-size:.9rem;font-weight:600;color:#e6edf3;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:12px}
.grid a{display:block;border-radius:8px;overflow:hidden;border:1px solid #30363d;transition:border-color .15s}
.grid a:hover{border-color:#58a6ff}
.grid img{width:100%;height:auto;display:block;background:#161b22}
.no-data{color:#8b949e;padding:20px 0;font-style:italic;font-size:.85rem}
.loading{color:#8b949e;padding:40px 20px;text-align:center;font-size:.9rem}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Monitoramento Diário — Cyber/QuintoAndar</h1>
  <div class="run-bar">
    <label>Execução:</label>
    <select id="run-sel" onchange="selecionarRun(this.value)"></select>
  </div>
  <span class="meta" id="meta-ts">Shell: 25/05/2026 17:18</span>
</header>
<nav class="tabs" id="tabs"></nav>
<main id="main"><p class="loading">Carregando dados...</p></main>
<script>
const GRUPOS = {"carteira": {"label": "🏦 Carteira Atual", "ms": ["M1", "M6"]}, "dist_foto": {"label": "📸 Distribuições — Foto Atual", "ms": ["M7"]}, "dist_dia": {"label": "📅 Distribuições no Dia", "ms": ["M2", "M8"]}, "acordos": {"label": "🤝 Acordos e Pagamentos", "ms": ["M3", "M4", "M5"]}};
const META   = {"M1": {"titulo": "Contratos por Segmento × Assessoria — foto atual"}, "M2": {"titulo": "Entradas no dia por Segmento × Assessoria"}, "M3": {"titulo": "Pagamentos por Meio — 45 dias"}, "M4": {"titulo": "Acordos Criados por Assessoria — 45 dias"}, "M5": {"titulo": "Acordos Cancelados e Quebrados — 45 dias"}, "M6": {"titulo": "Distribuição para Assessorias — foto atual"}, "M7": {"titulo": "Distribuição por Assessoria × Audiência — foto atual"}, "M8": {"titulo": "Distribuições do dia por Assessoria × Audiência"}};
const BASE = "https://danismerioQA.github.io/monitoramento-imagens/imagens";

let runAtual  = null;
let temaAtual = null;

async function init() {
  try {
    const resp = await fetch('./history.json?cb=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const runs = data.runs || [];
    if (!runs.length) {
      document.getElementById('main').innerHTML =
        '<p class="no-data" style="padding:40px 20px">Nenhuma execução registrada ainda.</p>';
      return;
    }
    const sel = document.getElementById('run-sel');
    runs.forEach((r, i) => {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = r.label;
      sel.appendChild(opt);
    });
    selecionarRun(0, runs);
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<p class="no-data" style="padding:40px 20px;color:#f85149">Erro ao carregar dados: ' + e.message + '</p>';
  }
}

function selecionarRun(idx, runs) {
  const allRuns = runs || window._runs;
  if (!allRuns) return;
  window._runs = allRuns;
  runAtual = allRuns[parseInt(idx)];
  document.getElementById('run-sel').value = idx;
  document.getElementById('meta-ts').textContent = 'Dados: ' + runAtual.label;
  renderTemas();
}

function renderTemas() {
  const nav  = document.getElementById('tabs');
  const main = document.getElementById('main');
  nav.innerHTML = ''; main.innerHTML = '';
  const keys = Object.keys(GRUPOS);
  keys.forEach((key, i) => {
    const g   = GRUPOS[key];
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.id = 'tab-' + key; btn.textContent = g.label;
    btn.onclick = () => showTema(key);
    nav.appendChild(btn);
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + key;
    panel.innerHTML = renderPanel(g.ms);
    main.appendChild(panel);
  });
  temaAtual = keys[0];
}

function renderPanel(ms) {
  return ms.map(m => {
    const info = META[m] || {};
    const pngs = (runAtual && runAtual.data && runAtual.data[m]) || [];
    const imgs = pngs.length
      ? pngs.map(p =>
          '<a href="' + BASE + '/' + p + '" target="_blank">' +
          '<img src="' + BASE + '/' + p + '" alt="' + m + '" loading="lazy"></a>'
        ).join('')
      : '<p class="no-data">Sem dados para esta execução.</p>';
    return '<div class="m-block"><div class="m-title">' + m + ' — ' + (info.titulo || m) + '</div>' +
           '<div class="grid">' + imgs + '</div></div>';
  }).join('');
}

function showTema(key) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t   => t.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  document.getElementById('tab-'   + key).classList.add('active');
  temaAtual = key;
}

init();
</script>
</body>
</html>
